<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css">
  <title>Coming Soon</title>
</head>
<body>
  <div class="container">
    <div class="badge">Chabi's Portfolio :) </div>
    <h1>Coming Soon</h1>

      Something exciting is on the way. <br>.☘︎ ݁˖ (˶˃ ᵕ ˂˶) Watch the space (˶˃ ᵕ ˂˶) .☘︎ ݁˖<br>We’re working behind the scenes to launch something lovely, fresh, and worth the wait.

    <div class="countdown">
      <div class="time-box">
        <span class="number" id="days">00</span>

      <div class="time-box">
        <span class="number" id="hours">00</span>

      <div class="time-box">
        <span class="number" id="minutes">00</span>
        <span class="label">Minutes</span>
      </div>
      <div class="time-box">
        <span class="number" id="seconds">00</span>
        <span class="label">Seconds</span>
      </div>

    <button class="notify-btn" id="notifyBtn">Notify Me</button>
    <div class="message" id="message"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
